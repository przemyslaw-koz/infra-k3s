---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
  labels:
    app: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.33.1
          envFrom:
            - configMapRef:
                name: cm-audiobookshelf
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - mountPath: /config
              name: config
              readOnly: false
            - mountPath: /metadata
              name: metadata
              readOnly: false
            - mountPath: /audiobooks
              name: audiobooks
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: config
        - name: metadata
          persistentVolumeClaim:
            claimName: metadata
        - name: audiobooks
          persistentVolumeClaim:
            claimName: audiobooks
